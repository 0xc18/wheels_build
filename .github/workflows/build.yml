name: Build

on: [push, pull_request]

jobs:
  build_wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pipx run uv run main.py
      - name: Build wheels
        run: pipx run cibuildwheel --platform android --output-dir ./wheelhouse/ --archs arm64_v8a
        env:
          CIBW_AUDIT_COMMAND: ""
        working-directory: pydantic_core-2.46.4
      - run: find -type f -name "*arm*"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: ./wheelhouse/*.whl
